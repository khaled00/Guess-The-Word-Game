<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1></h1>
    <div class="guess-game">
        <div class="guess-area">
            <div class="inputs"></div>
            <div class="controls">
                <button class="check">Check word</button>
                <button class="hint"><span></span> Hints</button>
            </div>
            <div class="massages"></div>
        </div>
        <div class="key-colors">
            <h2>Key colors</h2>
            <div class="key-color">
                <div class="key in-place"></div>
                <div class="key-text">Letter is Correct and in place</div>
            </div>
            <div class="key-color">
                <div class="key not-in-place"></div>
                <div class="key-text">Letter is Correct and NOT in place</div>
            </div>
            <div class="key-color">
                <div class="key no"></div>
                <div class="key-text">Letter is Worng</div>
            </div>
        </div>

    </div>
    
    <footer></footer>

    <script src="js/script.js"></script>
</body>
</html>
